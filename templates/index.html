<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-slate-900 text-white h-screen flex">
    <div class="w-1/3 p-8 border-r border-slate-700">
        <h1 class="text-3xl font-bold mb-6">UAV Optimizer</h1>
        <div class="space-y-4">
            <input type="number" id="payload" value="2.0" class="w-full p-2 bg-slate-800 rounded">
            <button onclick="optimize()" class="w-full bg-blue-600 p-3 rounded font-bold">RUN OPTIMIZATION</button>
        </div>
        <div id="out" class="mt-8 bg-slate-800 p-4 rounded text-sm"></div>
    </div>
    <div id="view" class="w-2/3"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(document.getElementById('view').clientWidth, window.innerHeight);
        document.getElementById('view').appendChild(renderer.domElement);
        
        let wing;
        function updateWing(w, root, tip) {
            if(wing) scene.remove(wing);
            const geo = new THREE.BufferGeometry();
            const verts = new Float32Array([0,0,0, root,0,0, w/2,0,tip, root+w/2,0,tip]);
            geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            wing = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0x00ff00, side: 2}));
            scene.add(wing);
        }
        
        async function optimize() {
            const res = await fetch('/api/optimize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({payload: document.getElementById('payload').value})
            });
            const json = await res.json();
            if(json.status === 'success') {
                const d = json.data;
                document.getElementById('out').innerText = `Score: ${d.score.toFixed(2)} | Span: ${d.wingspan.toFixed(2)}m`;
                updateWing(d.wingspan, d.root_chord, d.tip_chord);
            }
        }
        camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
