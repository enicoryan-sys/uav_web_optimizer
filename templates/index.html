<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UAV Design Optimizer</title>

  <!-- ── Import map: resolves bare module specifiers for dynamic import() ── -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --danger:   #f85149;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Layout ── */
    #sidebar {
      width: 280px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 12px;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      flex-wrap: wrap;
    }
    #tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 8px 14px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover { color: var(--text); }
    #content-area { flex: 1; position: relative; overflow: hidden; }
    .tab-panel { display: none; width: 100%; height: 100%; }
    .tab-panel.active { display: block; }

    /* ── 3D Viewer ── */
    #viewer-panel { background: #090e14; }
    #three-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    #viewer-overlay {
      position: absolute;
      top: 12px; left: 12px;
      display: flex; gap: 8px; flex-wrap: wrap;
      pointer-events: none;
    }
    .hud-badge {
      background: rgba(13,17,23,.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }
    .hud-badge span { color: var(--accent); font-weight: 600; }

    /* ── Analytics ── */
    #analytics-panel {
      padding: 24px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      align-content: start;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-card h4 { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-card .unit  { font-size: 12px; color: var(--muted); margin-left: 4px; }

    /* ── Sidebar controls ── */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-top: 4px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input[type=range] { width: 100%; accent-color: var(--accent); }
    .field .val-display {
      font-size: 12px;
      color: var(--text);
      text-align: right;
    }
    .field select, .field input[type=number] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 13px;
      width: 100%;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row label { font-size: 13px; color: var(--text); }
    input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px;
      padding: 8px 16px; font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary  { background: var(--accent); color: #000; }
    .btn-success  { background: var(--accent2); color: #000; }
    .btn-full     { width: 100%; }
    .btn-sm       { padding: 4px 10px; font-size: 12px; }

    /* ── Status bar ── */
    #status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    #status-text.ok   { color: var(--accent2); }
    #status-text.warn { color: #d29922; }
    #status-text.err  { color: var(--danger); }

    /* ── Loader ── */
    #loader {
      position: absolute; inset: 0;
      background: #090e14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    #loader.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     LEFT SIDEBAR — INPUT PARAMETERS
════════════════════════════════════════════ -->
<aside id="sidebar">
  <div style="font-weight:700;font-size:16px;color:var(--accent)">✈ UAV Optimizer</div>

  <div class="section-title">Mission</div>

  <div class="field">
    <label>Payload (kg)</label>
    <input type="range" id="sl-payload" min="0.1" max="10" step="0.1" value="1.5"
           oninput="updateDisplay('payload',this.value,'kg')">
    <div class="val-display" id="disp-payload">1.5 kg</div>
  </div>

  <div class="field">
    <label>Range (km)</label>
    <input type="range" id="sl-range" min="5" max="200" step="1" value="50"
           oninput="updateDisplay('range',this.value,'km')">
    <div class="val-display" id="disp-range">50 km</div>
  </div>

  <div class="field">
    <label>Cruise Speed (m/s)</label>
    <input type="range" id="sl-speed" min="5" max="40" step="0.5" value="15"
           oninput="updateDisplay('speed',this.value,'m/s')">
    <div class="val-display" id="disp-speed">15 m/s</div>
  </div>

  <div class="section-title">Airframe</div>

  <div class="field">
    <label>Wingspan (m)</label>
    <input type="range" id="sl-wingspan" min="0.5" max="4" step="0.05" value="1.5"
           oninput="updateDisplay('wingspan',this.value,'m'); refreshUAV()">
    <div class="val-display" id="disp-wingspan">1.5 m</div>
  </div>

  <div class="field">
    <label>Battery Capacity (Wh)</label>
    <input type="range" id="sl-battery" min="50" max="2000" step="10" value="400"
           oninput="updateDisplay('battery',this.value,'Wh')">
    <div class="val-display" id="disp-battery">400 Wh</div>
  </div>

  <div class="field">
    <label>Airfoil</label>
    <select id="sel-airfoil" onchange="refreshUAV()">
      <option value="NACA 2412">NACA 2412</option>
      <option value="NACA 4412">NACA 4412</option>
      <option value="Clark Y">Clark Y</option>
      <option value="Eppler 423">Eppler 423</option>
      <option value="S1223">S1223</option>
    </select>
  </div>

  <div class="toggle-row">
    <label for="chk-flying-wing">Flying Wing</label>
    <input type="checkbox" id="chk-flying-wing" onchange="refreshUAV()">
  </div>

  <hr style="border-color:var(--border)">

  <button class="btn btn-primary btn-full" onclick="runOptimize()">⚡ Optimize</button>
  <button class="btn btn-success  btn-full" onclick="runFeasibility()">✔ Check Feasibility</button>
</aside>

<!-- ════════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════════ -->
<div id="main">

  <!-- HUD top bar -->
  <div id="topbar">
    <div class="hud-badge">Score <span id="hud-score">—</span></div>
    <div class="hud-badge">AR <span id="hud-ar">—</span></div>
    <div class="hud-badge">Wingspan <span id="hud-ws">—</span> m</div>
    <div class="hud-badge">Airfoil <span id="hud-af">NACA 2412</span></div>
    <button class="btn btn-sm" style="margin-left:auto;background:var(--border);color:var(--text)"
            onclick="toggleTheme()">☀ Theme</button>
  </div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('viewer',this)">3D Viewer</button>
    <button class="tab-btn"        onclick="switchTab('analytics',this)">Analytics</button>
  </div>

  <!-- Tab panels -->
  <div id="content-area">

    <!-- 3D Viewer panel -->
    <div id="viewer-panel" class="tab-panel active">
      <div id="loader"><div class="spinner"></div><div>Loading 3D engine…</div></div>
      <canvas id="three-canvas"></canvas>
      <div id="viewer-overlay">
        <div class="hud-badge" id="badge-feasible" style="display:none"></div>
      </div>
    </div>

    <!-- Analytics panel -->
    <div id="analytics-panel" class="tab-panel">
      <div class="stat-card"><h4>Endurance</h4><div><span class="value" id="an-endurance">—</span><span class="unit">hr</span></div></div>
      <div class="stat-card"><h4>Lift-to-Drag</h4><div><span class="value" id="an-ld">—</span></div></div>
      <div class="stat-card"><h4>Wing Loading</h4><div><span class="value" id="an-wl">—</span><span class="unit">N/m²</span></div></div>
      <div class="stat-card"><h4>Power Required</h4><div><span class="value" id="an-pwr">—</span><span class="unit">W</span></div></div>
      <div class="stat-card"><h4>Stall Speed</h4><div><span class="value" id="an-stall">—</span><span class="unit">m/s</span></div></div>
      <div class="stat-card"><h4>Total Mass</h4><div><span class="value" id="an-mass">—</span><span class="unit">kg</span></div></div>
    </div>

  </div><!-- /content-area -->

  <div id="status-bar">
    <span id="status-text">Ready</span>
    <span id="status-time"></span>
  </div>
</div><!-- /main -->


<!-- ════════════════════════════════════════════
     REGULAR (non-module) SCRIPT
     dynamic import() works fine in plain scripts
════════════════════════════════════════════ -->
<script>
/* ─── globals ─────────────────────────────────────────── */
var THREE_G, scene, camera, renderer, orbitControls, uavGroup;
var animFrameId;
var darkTheme = true;

/* ─── boot Three.js via dynamic import ────────────────── */
async function bootThree() {
  try {
    // importmap resolves 'three' and 'three/addons/...' bare specifiers
    const [threeModule, { OrbitControls }] = await Promise.all([
      import('three'),
      import('three/addons/controls/OrbitControls.js')
    ]);

    THREE_G = threeModule;
    const {
      WebGLRenderer, Scene, PerspectiveCamera, Color,
      AmbientLight, DirectionalLight, PointLight,
      Group, Mesh,
      BoxGeometry, CylinderGeometry, ConeGeometry, SphereGeometry,
      MeshPhongMaterial, MeshStandardMaterial,
      GridHelper, AxesHelper
    } = threeModule;

    /* canvas + renderer */
    const canvas  = document.getElementById('three-canvas');
    const panel   = document.getElementById('viewer-panel');
    renderer = new WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;

    function resize() {
      const w = panel.clientWidth, h = panel.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(panel);

    /* scene */
    scene = new Scene();
    scene.background = new Color(0x090e14);

    /* camera */
    camera = new PerspectiveCamera(45, 1, 0.01, 1000);
    camera.position.set(3, 2, 4);
    camera.lookAt(0, 0, 0);

    /* orbit controls */
    orbitControls = new OrbitControls(camera, canvas);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;

    /* lights */
    scene.add(new AmbientLight(0xffffff, 0.6));
    const sun = new DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 8, 4);
    sun.castShadow = true;
    scene.add(sun);
    const fill = new PointLight(0x4488ff, 0.8, 30);
    fill.position.set(-4, 2, -3);
    scene.add(fill);

    /* grid */
    scene.add(new GridHelper(10, 20, 0x30363d, 0x1c2128));

    /* initial UAV mesh */
    uavGroup = new Group();
    scene.add(uavGroup);
    buildUAVMesh(1.5, false);

    /* render loop */
    resize();
    function animate() {
      animFrameId = requestAnimationFrame(animate);
      orbitControls.update();
      renderer.render(scene, camera);
    }
    animate();

    document.getElementById('loader').classList.add('hidden');
    setStatus('3D engine ready', 'ok');

  } catch(e) {
    console.error(e);
    document.getElementById('loader').innerHTML =
      '<div style="color:#f85149;text-align:center">❌ Failed to load 3D engine<br><small>' + e.message + '</small></div>';
    setStatus('3D engine error: ' + e.message, 'err');
  }
}

/* ─── UAV mesh builder ─────────────────────────────────── */
function buildUAVMesh(wingspan, flyingWing) {
  if (!THREE_G) return;
  const {
    Group, Mesh,
    BoxGeometry, CylinderGeometry, ConeGeometry, SphereGeometry,
    MeshPhongMaterial
  } = THREE_G;

  // clear old mesh children
  while (uavGroup.children.length) uavGroup.remove(uavGroup.children[0]);

  const ws   = Math.max(0.5, parseFloat(wingspan) || 1.5);
  const scale = ws / 1.5;  // normalise to default 1.5 m wingspan

  const matFuse  = new MeshPhongMaterial({ color: 0x58a6ff, shininess: 80 });
  const matWing  = new MeshPhongMaterial({ color: 0x3fb950, shininess: 60 });
  const matTail  = new MeshPhongMaterial({ color: 0xd29922, shininess: 60 });
  const matNose  = new MeshPhongMaterial({ color: 0xf85149, shininess: 100 });
  const matProp  = new MeshPhongMaterial({ color: 0xe6edf3, shininess: 120 });

  if (flyingWing) {
    /* ── Flying Wing ── */
    // centre body (thick)
    const body = new Mesh(new BoxGeometry(0.3*scale, 0.08*scale, 0.6*scale), matFuse);
    uavGroup.add(body);
    // swept wings (left + right)
    [-1, 1].forEach(side => {
      const wing = new Mesh(new BoxGeometry(ws*0.48, 0.04*scale, 0.4*scale), matWing);
      wing.position.set(side * ws*0.28, 0, 0.05*scale);
      wing.rotation.y = side * 0.18;
      uavGroup.add(wing);
    });
    // winglets
    [-1, 1].forEach(side => {
      const wlt = new Mesh(new BoxGeometry(0.03*scale, 0.1*scale, 0.18*scale), matTail);
      wlt.position.set(side * ws*0.48, 0.05*scale, 0.06*scale);
      uavGroup.add(wlt);
    });
  } else {
    /* ── Conventional UAV ── */
    // fuselage
    const fuse = new Mesh(new CylinderGeometry(0.06*scale, 0.05*scale, 1.0*scale, 12), matFuse);
    fuse.rotation.x = Math.PI/2;
    uavGroup.add(fuse);

    // nose cone
    const nose = new Mesh(new ConeGeometry(0.06*scale, 0.22*scale, 12), matNose);
    nose.rotation.x = -Math.PI/2;
    nose.position.set(0, 0, -0.6*scale);
    uavGroup.add(nose);

    // main wings (left + right)
    [-1, 1].forEach(side => {
      const wing = new Mesh(new BoxGeometry(ws*0.46, 0.025*scale, 0.22*scale), matWing);
      wing.position.set(side * ws*0.26, 0, 0.0);
      uavGroup.add(wing);
    });

    // horizontal stabiliser
    [-1, 1].forEach(side => {
      const hs = new Mesh(new BoxGeometry(ws*0.18, 0.02*scale, 0.12*scale), matTail);
      hs.position.set(side * ws*0.1, 0, 0.45*scale);
      uavGroup.add(hs);
    });

    // vertical stabiliser
    const vs = new Mesh(new BoxGeometry(0.02*scale, 0.14*scale, 0.16*scale), matTail);
    vs.position.set(0, 0.07*scale, 0.46*scale);
    uavGroup.add(vs);

    // propeller hub
    const hub = new Mesh(new SphereGeometry(0.04*scale, 10, 10), matProp);
    hub.position.set(0, 0, -0.71*scale);
    uavGroup.add(hub);

    // propeller blades
    [-1, 1].forEach(side => {
      const blade = new Mesh(new BoxGeometry(0.28*scale, 0.015*scale, 0.06*scale), matProp);
      blade.position.set(side * 0.14*scale, 0, -0.71*scale);
      uavGroup.add(blade);
    });
  }
}

/* ─── sidebar helpers ──────────────────────────────────── */
function updateDisplay(id, val, unit) {
  document.getElementById('disp-' + id).textContent = val + ' ' + unit;
}

function getParams() {
  return {
    payload:     parseFloat(document.getElementById('sl-payload').value),
    range_km:    parseFloat(document.getElementById('sl-range').value),
    cruise_speed:parseFloat(document.getElementById('sl-speed').value),
    wingspan:    parseFloat(document.getElementById('sl-wingspan').value),
    battery_wh:  parseFloat(document.getElementById('sl-battery').value),
    airfoil:     document.getElementById('sel-airfoil').value,
    flying_wing: document.getElementById('chk-flying-wing').checked
  };
}

function refreshUAV() {
  const p = getParams();
  buildUAVMesh(p.wingspan, p.flying_wing);
  document.getElementById('hud-af').textContent = p.airfoil;
  document.getElementById('hud-ws').textContent = p.wingspan.toFixed(2);
}

/* ─── tab switching ────────────────────────────────────── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id + '-panel').classList.add('active');
  btn.classList.add('active');
}

/* ─── theme toggle ─────────────────────────────────────── */
function toggleTheme() {
  darkTheme = !darkTheme;
  if (scene) scene.background = new THREE_G.Color(darkTheme ? 0x090e14 : 0xd0dce8);
  document.body.style.setProperty('--bg', darkTheme ? '#0d1117' : '#f0f4f8');
  document.body.style.setProperty('--surface', darkTheme ? '#161b22' : '#ffffff');
  document.body.style.setProperty('--text', darkTheme ? '#e6edf3' : '#24292f');
}

/* ─── status bar ───────────────────────────────────────── */
function setStatus(msg, cls) {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = cls || '';
  document.getElementById('status-time').textContent = new Date().toLocaleTimeString();
}

/* ─── API calls ────────────────────────────────────────── */
async function runOptimize() {
  setStatus('Optimizing…', 'warn');
  try {
    const res  = await fetch('/api/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(getParams())
    });
    const data = await res.json();

    document.getElementById('hud-score').textContent = (data.score ?? '—').toFixed ? data.score.toFixed(2) : data.score;
    document.getElementById('hud-ar').textContent    = data.aspect_ratio ? data.aspect_ratio.toFixed(2) : '—';

    if (data.wingspan) {
      const ws = parseFloat(data.wingspan);
      document.getElementById('sl-wingspan').value   = ws;
      document.getElementById('disp-wingspan').textContent = ws.toFixed(2) + ' m';
      document.getElementById('hud-ws').textContent  = ws.toFixed(2);
      buildUAVMesh(ws, getParams().flying_wing);
    }

    // analytics
    fillAnalytics(data);
    setStatus('Optimization complete', 'ok');
  } catch(e) {
    setStatus('Optimize error: ' + e.message, 'err');
  }
}

async function runFeasibility() {
  setStatus('Checking feasibility…', 'warn');
  try {
    const res  = await fetch('/api/feasibility', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(getParams())
    });
    const data = await res.json();
    const badge = document.getElementById('badge-feasible');
    badge.style.display = '';
    if (data.feasible) {
      badge.textContent = '✔ Feasible';
      badge.style.color = '#3fb950';
    } else {
      badge.textContent = '✘ Infeasible: ' + (data.reason || '');
      badge.style.color = '#f85149';
    }
    fillAnalytics(data);
    setStatus(data.feasible ? 'Design is feasible' : 'Design infeasible — ' + (data.reason||''), data.feasible ? 'ok' : 'err');
  } catch(e) {
    setStatus('Feasibility error: ' + e.message, 'err');
  }
}

function fillAnalytics(data) {
  const set = (id, val, dec=2) => {
    const el = document.getElementById(id);
    if (el) el.textContent = (val != null && val !== undefined) ? parseFloat(val).toFixed(dec) : '—';
  };
  set('an-endurance', data.endurance);
  set('an-ld',        data.lift_to_drag ?? data.ld_ratio);
  set('an-wl',        data.wing_loading,  1);
  set('an-pwr',       data.power_required,1);
  set('an-stall',     data.stall_speed);
  set('an-mass',      data.total_mass);
}

/* ─── start ────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', bootThree);
</script>
</body>
</html>
